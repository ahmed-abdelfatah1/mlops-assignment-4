# .github/workflows/pipeline.yml
# MLOps Assignment 5: Multi-job CI/CD Pipeline

name: ML Model Validation and Deployment Pipeline

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
  workflow_dispatch:  # Allow manual trigger

jobs:
  # Job 1: Validation Job
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Pull Data (DVC Simulated)
        run: |
          echo "Simulating dvc pull..."
          echo "Data pulled successfully from remote storage"

      - name: Train Model
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
        run: |
          python train_mlflow.py --epochs 5 --experiment_name "CI_CD_Pipeline"

      - name: Verify model_info.txt Created
        run: |
          if [ -f model_info.txt ]; then
            echo "model_info.txt created successfully"
            echo "Run ID: $(cat model_info.txt)"
          else
            echo "ERROR: model_info.txt was not created"
            exit 1
          fi

      - name: Upload Model Info Artifact
        uses: actions/upload-artifact@v4
        with:
          name: model-info
          path: model_info.txt
          retention-days: 5

      - name: Upload MLflow Data
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-data
          path: |
            mlruns/
            mlflow.db
          retention-days: 5

  # Job 2: Deployment Job
  deploy:
    runs-on: ubuntu-latest
    needs: validate  # Depends on validation job
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download Model Info Artifact
        uses: actions/download-artifact@v4
        with:
          name: model-info

      - name: Download MLflow Data
        uses: actions/download-artifact@v4
        with:
          name: mlflow-data

      - name: Display Run ID
        run: |
          echo "Downloaded model_info.txt"
          echo "Run ID: $(cat model_info.txt)"

      - name: Check Accuracy Threshold
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
        run: |
          python check_threshold.py

      - name: Mock Docker Build
        run: |
          echo "Building Docker image for Run ID: $(cat model_info.txt)"
          echo "Docker build completed successfully!"
